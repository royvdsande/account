<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account - Simple template</title>
  <meta name="description" content="A simple account website with sign in, registration, profile, security, and billing settings." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="/css/variables.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/landing.css" />
  <link rel="stylesheet" href="/css/responsive.css" />
</head>
<body>
  <nav class="nav">
    <a class="nav-logo button-reset" href="/">
      <div class="nav-logo-icon">A</div>
      Account
    </a>
    <div class="nav-actions">
      <div class="nav-auth-skeleton">
        <div class="skeleton-pill skeleton-pill--link"></div>
        <div class="skeleton-pill"></div>
      </div>
      <a class="nav-link button-reset nav-auth-logged-out hidden" href="/auth/login">Sign in</a>
      <a class="btn btn-primary nav-auth-logged-out hidden" href="/auth/signup">Create account</a>
      <a class="btn btn-primary nav-auth-logged-in hidden" href="/settings">Settings</a>
    </div>
    <button class="nav-burger" id="burger-landing" data-menu-target="menu-landing" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="mobile-menu" id="menu-landing">
    <div class="mobile-menu-actions">
      <a class="btn btn-outline btn-full nav-auth-logged-out" href="/auth/login">Sign in</a>
      <a class="btn btn-primary btn-full nav-auth-logged-out" href="/auth/signup">Create account</a>
      <a class="btn btn-outline btn-full nav-auth-logged-in hidden" href="/settings">Settings</a>
    </div>
  </div>
  <script>
    (function () {
      var btn = document.getElementById('burger-landing');
      var menu = document.getElementById('menu-landing');
      if (!btn || !menu) return;
      btn.addEventListener('click', function () {
        var open = !menu.classList.contains('open');
        menu.classList.toggle('open', open);
        btn.classList.toggle('open', open);
      });
    })();
  </script>

  <script type="module" src="/js/public.js"></script>
</body>
</html>
